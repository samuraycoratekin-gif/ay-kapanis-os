<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ürün Seçimi — Ay Kapanış OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/stil.css">
  <script>
    (function(){
      var mevcut = 'lacivert';
      try { mevcut = localStorage.getItem('aykapanis_tema') || 'lacivert'; } catch(e){}
      document.documentElement.setAttribute('data-tema', mevcut);
    })();
  </script>
  <style>
    .secim-wrap { max-width: 920px; margin: 0 auto; padding-top: 4vh; }
    .secim-bas { text-align: center; margin-bottom: 40px; }
    .secim-bas h1 { font-family:'Outfit',sans-serif; font-weight:800; font-size:32px;
      display:flex; align-items:center; justify-content:center; gap:12px; }
    .secim-bas p { color: var(--text-muted); margin-top: 8px; font-size: 15px; }
    .urun-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:24px; }
    @media (max-width: 640px) { .urun-grid { grid-template-columns: 1fr; } }
    .urun-kart { background: var(--card-bg, rgba(255,255,255,0.04)); border:1px solid rgba(255,255,255,0.10);
      border-radius:18px; padding:32px 28px; text-align:center; transition:.18s; position:relative;
      display:flex; flex-direction:column; align-items:center; }
    .urun-kart.hazir { cursor:pointer; }
    .urun-kart.hazir:hover { transform:translateY(-4px); border-color:var(--accent-cyan);
      box-shadow:0 12px 32px rgba(0,0,0,0.28); }
    .urun-kart.yakinda { opacity:.72; }
    .urun-ikon { width:74px; height:74px; border-radius:18px; display:flex; align-items:center;
      justify-content:center; font-size:32px; margin-bottom:18px; }
    .ik-kapanis { background:rgba(34,211,238,0.14); color:var(--accent-cyan); }
    .ik-mutabakat { background:rgba(167,139,250,0.14); color:#a78bfa; }
    .urun-kart h2 { font-family:'Outfit',sans-serif; font-weight:700; font-size:21px; }
    .urun-kart .aciklama { color:var(--text-muted); font-size:13.5px; margin:10px 0 22px; line-height:1.5; min-height:42px; }
    .urun-btn { margin-top:auto; padding:11px 26px; border-radius:10px; font-family:'Outfit',sans-serif;
      font-weight:600; font-size:14px; border:none; }
    .urun-btn.gir { background:var(--accent-cyan); color:#04222a; }
    .rozet { position:absolute; top:16px; right:16px; font-size:11px; padding:4px 10px; border-radius:999px;
      font-weight:700; letter-spacing:.4px; }
    .rozet.aktif { background:rgba(52,211,153,0.16); color:var(--accent-emerald,#34d399); }
    .rozet.soon { background:rgba(251,191,36,0.16); color:var(--accent-gold,#fbbf24); }
    .yakinda-not { margin-top:auto; color:var(--text-muted); font-size:13px; font-weight:600; }
    .secim-alt { text-align:center; margin-top:34px; }
    .secim-alt a { color:var(--text-muted); font-size:13px; text-decoration:none; }
    .secim-alt a:hover { color:var(--accent-cyan); }
  </style>
</head>
<body>
  <div class="container">
    <div class="secim-wrap">
      <div class="secim-bas">
        <h1><i class="fa-solid fa-compass-drafting" style="color:var(--accent-cyan)"></i> <span id="ofis-adi">Ay Kapanış OS</span></h1>
        <p>Hangi ürünle çalışmak istiyorsunuz?</p>
      </div>
      <div class="urun-grid" id="urun-grid"></div>
      <div class="secim-alt"><a href="/giris" onclick="return cikis(event)"><i class="fa-solid fa-arrow-right-from-bracket"></i> Çıkış yap</a></div>
    </div>
  </div>

  <script>
    (function(){ const _f = window.fetch;
      window.fetch = (...a) => _f(...a).then(r => { if (r.status === 401) location.href = '/giris'; return r; }); })();

    const META = {
      ay_kapanis: { ikon:'fa-calendar-check', sinif:'ik-kapanis',
        aciklama:'Aylık kapanış kontrol listesi, mizan analizi ve müşteri panosu.' },
      mutabakat:  { ikon:'fa-scale-balanced', sinif:'ik-mutabakat',
        aciklama:'GİB öncelikli 3 aşamalı cari mutabakat ve fark analizi.' }
    };

    function cikis(e){ e.preventDefault(); location.href='/giris'; return false; }

    async function yukle(){
      const r = await fetch('/api/urunler');
      const d = await r.json();
      if (d.ofis_adi) document.getElementById('ofis-adi').innerText = d.ofis_adi;
      const grid = document.getElementById('urun-grid');
      grid.innerHTML = (d.urunler || []).map(u => {
        const m = META[u.kod] || { ikon:'fa-cube', sinif:'ik-kapanis', aciklama:'' };
        if (u.hazir) {
          return `<div class="urun-kart hazir" onclick="location.href='${u.url}'">
            <span class="rozet aktif">AKTİF</span>
            <div class="urun-ikon ${m.sinif}"><i class="fa-solid ${m.ikon}"></i></div>
            <h2>${u.ad}</h2>
            <div class="aciklama">${m.aciklama}</div>
            <button class="urun-btn gir">Gir <i class="fa-solid fa-arrow-right"></i></button>
          </div>`;
        }
        return `<div class="urun-kart yakinda" onclick="location.href='/mutabakat'" style="cursor:pointer">
          <span class="rozet soon">YAKINDA</span>
          <div class="urun-ikon ${m.sinif}"><i class="fa-solid ${m.ikon}"></i></div>
          <h2>${u.ad}</h2>
          <div class="aciklama">${m.aciklama}</div>
          <div class="yakinda-not"><i class="fa-solid fa-clock"></i> Hazırlanıyor</div>
        </div>`;
      }).join('');
    }
    yukle();
  </script>
</body>
</html>
