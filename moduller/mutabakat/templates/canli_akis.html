<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Canlı Akış — Mutabakat Motoru</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1d3d;--yuzey:#172a4d;--yuzey2:#1e3357;--cizgi:rgba(255,255,255,.10);
    --metin:#f8fafc;--soluk:#94a3b8;
    --mavi:#14b8a6;--yesil:#10b981;--kirmizi:#f43f5e;--turuncu:#f59e0b;--mor:#6366f1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter','Segoe UI',-apple-system,Arial,sans-serif;min-height:100vh;
    background:radial-gradient(1100px 600px at 0% 0%,rgba(20,184,166,.16),transparent 60%),
    radial-gradient(900px 600px at 100% 0%,rgba(16,185,129,.12),transparent 60%),var(--bg);
    color:var(--metin);display:flex;flex-direction:column;padding:26px clamp(16px,4vw,48px)}
  header{text-align:center;margin-bottom:6px}
  .rozet{display:inline-block;background:rgba(99,102,241,.16);color:#a5b4fc;font-size:11px;
    font-weight:800;letter-spacing:1px;padding:4px 14px;border-radius:30px;margin-bottom:10px}
  h1{font-size:clamp(20px,3vw,28px);font-weight:800;letter-spacing:-.5px}
  h1 span{color:var(--mavi)}
  .alt{color:var(--soluk);font-size:13.5px;margin-top:6px}

  /* ilerleme cubugu */
  .bar{max-width:920px;margin:22px auto 8px;height:6px;background:var(--yuzey2);border-radius:30px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--mavi),var(--mor));
    border-radius:30px;transition:width .5s ease}
  .durumyaz{text-align:center;color:var(--soluk);font-size:13px;margin-bottom:18px;min-height:18px}
  .durumyaz b{color:var(--metin)}

  /* pipeline */
  .pipe{flex:1;display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;
    max-width:1180px;margin:0 auto;width:100%}
  .step{flex:1 1 0;min-width:150px;max-width:185px;background:var(--yuzey);border:1px solid var(--cizgi);
    border-radius:16px;padding:18px 15px;text-align:center;position:relative;transition:.35s;opacity:.4}
  .ikon{font-size:26px;margin-bottom:8px;display:block}
  .num{position:absolute;top:10px;left:12px;width:22px;height:22px;border-radius:50%;
    background:var(--yuzey2);color:var(--soluk);font-size:11px;font-weight:800;
    display:flex;align-items:center;justify-content:center;transition:.35s}
  .ad{font-size:13.5px;font-weight:800;margin-bottom:5px}
  .ac{font-size:11px;color:var(--soluk);line-height:1.5}
  .step.calis{opacity:1;border-color:var(--mavi);transform:translateY(-8px) scale(1.07);
    box-shadow:0 14px 40px rgba(20,184,166,.32)}
  .step.calis .num{background:var(--mavi);color:#06101f;animation:nb 1s infinite}
  .step.calis::after{content:'';position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:linear-gradient(120deg,transparent 32%,rgba(20,184,166,.22) 50%,transparent 68%);
    background-size:220% 100%;animation:tar 1.1s linear infinite}
  .step.bitti{opacity:1;border-color:rgba(16,185,129,.55)}
  .step.bitti .num{background:var(--yesil);color:#06101f}
  @keyframes nb{0%,100%{box-shadow:0 0 0 0 rgba(20,184,166,.6)}50%{box-shadow:0 0 0 9px rgba(20,184,166,0)}}
  @keyframes tar{0%{background-position:120% 0}100%{background-position:-120% 0}}
  .ok{display:flex;align-items:center;color:var(--soluk);font-size:20px;padding:0 3px;opacity:.4;
    position:relative;transition:.3s}
  .ok.akar{opacity:1;color:var(--mavi)}
  .ok .pkt{position:absolute;left:-3px;top:50%;width:9px;height:9px;border-radius:50%;
    background:var(--mavi);box-shadow:0 0 10px 3px rgba(20,184,166,.8);opacity:0;transform:translateY(-50%)}
  .ok.akar .pkt{animation:pkt .75s ease-in-out}
  @keyframes pkt{0%{left:-3px;opacity:0}15%{opacity:1}85%{opacity:1}100%{left:26px;opacity:0}}
  @media(max-width:820px){.ok{transform:rotate(90deg)}.pipe{flex-direction:column}.step{max-width:none;width:100%}}

  /* bitis ozeti */
  .ozet{max-width:720px;margin:22px auto 4px;background:rgba(16,185,129,.12);
    border:1px solid rgba(16,185,129,.4);border-radius:14px;padding:18px 22px;
    text-align:center;font-size:14px;line-height:1.6;opacity:0;transform:translateY(8px);
    transition:.5s}
  .ozet.gor{opacity:1;transform:none}
  .ozet b{color:#6ee7b7}
  .footer{text-align:center;margin-top:18px}
  .kapat{background:var(--yuzey);border:1px solid var(--cizgi);color:var(--metin);
    padding:10px 22px;border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer}
  .kapat:hover{border-color:var(--mavi)}
  .tekrar{background:transparent;border:none;color:var(--mor);font-weight:700;cursor:pointer;
    font-size:13.5px;margin-right:14px}
</style>
</head>
<body>
  <header>
    <span class="rozet">CANLI AKIŞ · MUTABAKAT MOTORU</span>
    <h1>6 Aşamalı <span>Akıllı Mutabakat</span> İşlem Akışı</h1>
    <div class="alt" id="alt">Hazırlanıyor…</div>
  </header>

  <div class="bar"><i id="cubuk"></i></div>
  <div class="durumyaz" id="durumyaz">Başlatılıyor…</div>

  <div class="pipe" id="pipe"></div>

  <div class="ozet" id="ozet"></div>
  <div class="footer">
    <button class="tekrar" onclick="oynat()">↻ Tekrar oynat</button>
    <button class="kapat" onclick="window.close()">Kapat</button>
  </div>

<script>
const params=new URLSearchParams(location.search);
const TIP=params.get("tip")||"ilk";              // "ilk" | "tekrar"
const N=parseInt(params.get("n")||"0",10);

const AKIS=[
  {ik:"📥",ad:"Veri Yükleme",     ac:"Bizim defter + karşı ekstre + GİB e-Fatura alınır"},
  {ik:"🏛️",ad:"GİB Kontrolü",     ac:"e-Faturalar GİB otoritesiyle doğrulanır (hakem)"},
  {ik:"🔗",ad:"Eşleştirme Motoru",ac:"EXACT → FUZZY → TUTAR FARKI → SUBSET-SUM"},
  {ik:"🧮",ad:"Triyaj & Rapor",   ac:"Otomatik kapananlar elenir, fark kalemleri öne çıkar"},
  {ik:"📤",ad:"Mutabakat Formu",  ac:TIP==="tekrar"?`Seçili ${N} cariye form TEKRAR gönderilir`:`Seçili ${N} cariye mutabakat formu gönderilir`},
  {ik:"📨",ad:"Yanıt & Takip",    ac:"Yanıtlar toplanır; mükerrer engellenir, mutabık kapanır"},
];

document.getElementById("alt").textContent = TIP==="tekrar"
  ? `Tekrar gönderim · ${N} cari (yanıt bekleyen + itirazlı) · mutabıklar kilitli`
  : `İlk gönderim · seçili ${N} cariye toplu mutabakat`;

function ciz(durumlar){
  const el=document.getElementById("pipe"); el.innerHTML="";
  AKIS.forEach((a,i)=>{
    if(i>0){
      const o=document.createElement("div");
      o.className="ok"+(durumlar[i-1]==="bitti"?" akar":"");
      o.innerHTML='<span class="pkt"></span>→';
      el.appendChild(o);
    }
    const d=document.createElement("div");
    d.className="step "+(durumlar[i]||"");
    d.innerHTML=`<span class="num">${durumlar[i]==="bitti"?"✓":(i+1)}</span>
      <span class="ikon">${a.ik}</span>
      <div class="ad">${a.ad}</div><div class="ac">${a.ac}</div>`;
    el.appendChild(d);
  });
}

let calisiyor=false;
async function oynat(){
  if(calisiyor) return; calisiyor=true;
  document.getElementById("ozet").classList.remove("gor");
  const durumlar=AKIS.map(()=>"");
  const cubuk=document.getElementById("cubuk");
  const dy=document.getElementById("durumyaz");
  ciz(durumlar); cubuk.style.width="0";
  for(let i=0;i<AKIS.length;i++){
    durumlar[i]="calis"; ciz(durumlar);
    dy.innerHTML=`Çalışıyor — <b>${i+1}/6</b> · ${AKIS[i].ad}`;
    cubuk.style.width=((i+0.5)/AKIS.length*100)+"%";
    await new Promise(r=>setTimeout(r, i===4?1100:750));
    durumlar[i]="bitti"; ciz(durumlar);
    cubuk.style.width=((i+1)/AKIS.length*100)+"%";
    await new Promise(r=>setTimeout(r,180));
  }
  dy.innerHTML="✅ <b>Tamamlandı</b> — formlar gönderildi, yanıtlar bekleniyor";
  const oz=document.getElementById("ozet");
  oz.innerHTML = TIP==="tekrar"
    ? `🔁 <b>${N} cariye</b> mutabakat formu tekrar gönderildi. Mutabık olanlara <b>tekrar gitmedi</b> — mükerrer önlendi. Yanıtlar geldikçe panoya düşecek.`
    : `📤 <b>${N} cariye</b> mutabakat formu gönderildi (1. gönderim). Yanıtlar geldikçe <b>“Güncel Durum”</b> sekmesinde görünecek.`;
  oz.classList.add("gor");
  calisiyor=false;
}
oynat();
</script>
</body>
</html>
