  .filtreler{display:flex;gap:6px;flex-wrap:wrap}
  .ft{background:var(--yuzey);border:1px solid var(--cizgi);color:var(--soluk);padding:8px 16px;
    border-radius:30px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
  .ft:hover{border-color:var(--mavi);color:var(--metin)}
  .ft.akt{background:var(--mavi);border-color:var(--mavi);color:#06101f}
  .ara{margin-left:auto;background:var(--yuzey);border:1px solid var(--cizgi);color:var(--metin);

  .btn.ghost:hover{border-color:var(--mavi)}
  .sayim{color:var(--soluk);font-size:13px}

  .sonuc{background:rgba(16,185,129,.14);color:#6ee7b7;border-radius:10px;padding:12px 16px;

</head>

// ---- Karşı taraf maili: ERP cari kartı (VERI.mail) = varsayılan, elle override = yapışkan ----
// Gerçek/canlı kurulumda mail kaynağı ERP cari kartı olacak (ERP entegrasyonu gerekecek).
const MAIL_KEY="mutabakat_mail_override";
function mailOverrides(){ try{return JSON.parse(localStorage.getItem(MAIL_KEY)||"{}");}catch(e){return {};} }
function erpMail(kod){ const r=VERI.find(x=>x.kod===kod); return r?(r.mail||""):""; }
function mailGet(kod){ const o=mailOverrides()[kod]; return o?o.mail:erpMail(kod); }
function mailKaynak(kod){ return mailOverrides()[kod]?"elle":"ERP"; }
function mailDuzenle(kod){
  const cur=mailGet(kod);
  const yeni=prompt("Cari "+kod+" — mutabakat e-postası:\n"+
    "(ERP cari kartından geldi. Değiştirirsen son güncel kalır; boş bırakırsan ERP'ye döner.)", cur);
  if(yeni===null) return;
  const v=yeni.trim();
  if(v && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)){ alert("Geçerli bir e-posta adresi girin."); return; }
  const o=mailOverrides();
  if(v==="" || v===erpMail(kod)){ delete o[kod]; }            // ERP varsayılanına dön
  else { o[kod]={mail:v, zaman:new Date().toLocaleString('tr-TR')}; }  // yapışkan override
  localStorage.setItem(MAIL_KEY, JSON.stringify(o));
  ciz();
}
function mailHucre(kod){
  const m=mailGet(kod), k=mailKaynak(kod);
  const rz = k==="elle"
    ? '<span class="mrz elle" title="Elle güncellendi — ERP değişse bile bu kalır">elle</span>'
    : '<span class="mrz erp" title="ERP cari kartından geldi">ERP</span>';
  return `<div class="mailh"><span class="madr">${m||'<span class="bos">— yok —</span>'}</span>${rz}`+
    `<button class="medit" title="Maili düzenle" onclick="mailDuzenle('${kod}')">✎</button></div>`;
}
const fark=r=>r.durum==="BEKLIYOR"?null:(r.bizim-r.karsi);
const etiket={MUTABIK:["mut","Mutabık 🔒"],ITIRAZLI:["itz","İtirazlı"],BEKLIYOR:["bek","Yanıt bekleniyor"]};

let mod="on";                          // "on" = ilk gonderim, "guncel" = yanitlar geldi

// "Guncel Durum" sekmesi, ilk gonderim yapilana kadar kilitli kalir.

let seciliG=new Set();  // tekrar gonderimde secili cariler
// VERI her degistiginde (motor verisi / kurgu / hardcoded showcase) secimleri yeniden kur.
function seciliKur(){
  secili=new Set(VERI.map(r=>r.kod));
  seciliG=new Set(VERI.filter(r=>r.durum==="BEKLIYOR").map(r=>r.kod));
}

/* ---------- MOD: ILK GONDERIM ---------- */
function onKpi(){

async function gonder(){

/* ---------- MOD: GUNCEL DURUM ---------- */

  const m=VERI.filter(r=>r.durum==="MUTABIK").length;
  const i=VERI.filter(r=>r.durum==="ITIRAZLI").length;
  const b=VERI.filter(r=>r.durum==="BEKLIYOR").length;

    ["o",b,"yanıt bekliyor"],["m","%"+oran,"yanıt oranı"],["r","₺"+TL(tf),"toplam fark"]];

    `<div class="k ${c}"><b>${v}</b><span>${s}</span></div>`).join("");
}
function guncelArac(){

    <div class="filtreler" id="filtreler">

  document.getElementById("filtreler").addEventListener("click",e=>{

function tikleG(kod,on){on?seciliG.add(kod):seciliG.delete(kod);guncelArac();guncelTablo();}
function hepsiSecG(on){
  let rows=filtreSirala().filter(tekrarUygun);
  if(filtre!=="hepsi") rows=rows.filter(r=>r.durum===filtre);
  rows.forEach(r=>on?seciliG.add(r.kod):seciliG.delete(r.kod));

        body:JSON.stringify({musteri:AKTIF_MUSTERI,secili:sec.map(x=>x.kod)})}).then(x=>x.json());
    }catch(e){ s.innerHTML="⚠️ Gönderim hatası: "+e; return; }
    const gon=r.gonderilen||[], atl=r.atlanan||[];

    canliIzle("tekrar", sec.length);
    s.innerHTML=`🔁 <b>${gon.length} cariye</b> mutabakat formu tekrar gönderildi `+
      `(${r.tur}. tur · ${bek} bekleyen + ${itz} itirazlı). `+
      `✉️ <b>${ok}</b> e-posta iletildi`+
      (hata.length?` · ⚠️ <b>${hata.length}</b> mailde hata: ${hata[0].mail_hata}`:``)+
      (atl.length?` · ${atl.length} cariye gitmedi (mükerrer önlendi).`:``);
  } else {

  }

  let rows=filtreSirala();
  if(filtre!=="hepsi") rows=rows.filter(r=>r.durum===filtre);
  document.getElementById("bas").innerHTML=`<tr>
     <th class="nos"><input type="checkbox" id="topsecg" onclick="hepsiSecG(this.checked)" title="Uygun olanların hepsini seç"></th>

     <th class="nos">Mutabakat Maili</th>
     <th class="sag" data-s="bizim">Bizim Bakiye <span class="ok">↕</span></th>
     <th class="sag" data-s="karsi">Karşı Bakiye <span class="ok">↕</span></th>
     <th class="sag" data-s="fark">Fark <span class="ok">↕</span></th>

      :`<span class="bos">yanıt yok</span>`;

      ?`<button class="acikbtn" onclick="acAciklama('${r.kod}')">📋 Eksikleri gör</button>`
      :`<span class="bos">—</span>`;
    return `<tr>

      <td>${mailHucre(r.kod)}</td>

      <td class="sag">${farkHtml}</td>

      <td>${yanitHtml}</td>

     <td class="sag">${TL(tb)}</td><td class="sag">${TL(tk)}</td><td colspan="5"></td></tr>`;

  const uygunRows=rows.filter(tekrarUygun);
  if(ts) ts.checked = uygunRows.length>0 && uygunRows.every(r=>seciliG.has(r.kod));
}

/* ---------- ORTAK ---------- */
function filtreSirala(){
  let rows=VERI.slice();
  if(arama){const q=arama.toLocaleLowerCase('tr');
    rows=rows.filter(r=>r.firma.toLocaleLowerCase('tr').includes(q)||r.kod.includes(q));}
  const {a,yon}=sira;
  rows.sort((x,y)=>{
    let vx=a==="fark"?Math.abs(fark(x)||0):x[a], vy=a==="fark"?Math.abs(fark(y)||0):y[a];
    if(a==="yanit"){vx=x.yanit||"";vy=y.yanit||"";}
    if(typeof vx==="string")return vx.localeCompare(vy,'tr')*yon;
    return (vx-vy)*yon;
  });
  return rows;
}
function baslikSirala(){
  document.querySelectorAll("th[data-s]").forEach(th=>{
    th.addEventListener("click",()=>{
      const a=th.dataset.s; sira.yon=sira.a===a?-sira.yon:1; sira.a=a; ciz();
    });
  });
}
function acAciklama(kod){
  const r=VERI.find(x=>x.kod===kod); const e=EKSIK[kod]||{biz:[],karsi:[],fark:[]};
  const f=fark(r);
  const dv=DEVIR[kod];
  const devirHtml = dv?`<div class="devirban">↻ <b>DEVİR/AÇILIŞ FARKI</b> — ${dv.ac}</div>`:"";
  const cap=CAPRAZ.find(c=>c.eksik_kod===kod||c.fazla_kod===kod);
  const capHtml = cap?`<div class="devirban" style="background:rgba(99,102,241,.12);
       border-color:rgba(99,102,241,.40);color:#a5b4fc">🔀 <b>ÇAPRAZ CARİ</b> — ${cap.ac}</div>`:"";
  document.getElementById("mbas").innerHTML=
    `<h2>${r.firma} <span style="color:var(--soluk);font-weight:600;font-size:15px">(${r.kod})</span></h2>
     <div class="msub">İtirazlı yanıt · Bizim bakiye ${TL(r.bizim)} ₺ · Karşı bakiye ${TL(r.karsi)} ₺ ·
       Fark <b style="color:var(--turuncu)">${TL(Math.abs(f))} ₺</b></div>
     ${devirHtml}${capHtml}`;
  const kol=(cls,bas,arr)=>`<div class="mkol ${cls}">
     <div class="mkbas">${bas} (${arr.length})</div>
     ${arr.length?arr.map(t=>`<div class="meks">${t}</div>`).join(''):'<div class="meksbos">— eksik yok —</div>'}</div>`;
  document.getElementById("meksik").innerHTML=
    kol("biz","🔴 BİZ tamamlayacağız",e.biz)+
    kol("karsi","🟠 KARŞI TARAF tamamlayacak",e.karsi)+
    kol("fark","⚖️ Tutar farkı — GİB hakem",e.fark);
  const toplam=e.biz.length+e.karsi.length+e.fark.length;
  document.getElementById("mnot").innerHTML=
    `Toplam <b>${toplam}</b> kalem fark bulundu. Her iki taraf kendi eksiğini tamamlayıp `+
    `yeniden mutabakat çalıştırıldığında fark <b>0</b>'a iner ve cari <b>Mutabık</b> olur. `+
    `Bizim eksiğimiz bizim görevimiz, karşı tarafınki ona bildirim olarak düşer.`;
  document.getElementById("modalbg").classList.add("acik");
}
function kapatAciklama(){document.getElementById("modalbg").classList.remove("acik");}
document.addEventListener("keydown",e=>{if(e.key==="Escape")kapatAciklama();});

const KARSI_HAVUZ=[
 "Yıldız Ambalaj San.","Ceyhan Lojistik A.Ş.","Doruk Metal Ltd.","Pınar Tekstil San.",
 "Akın Kimya A.Ş.","Deniz Gıda Ltd. Şti.","Boğaziçi Nakliyat","Atlas İnşaat Malz.",
 "Güneş Elektrik A.Ş.","Çınar Orman Ürünleri","Meriç Cam San.","Toprak Tarım Ltd.",
 "Mavi Deniz Su Ürünleri","Kervan Turizm","Filiz Otomotiv Yan San.","Hedef Enerji A.Ş.",
 "Bereket Un Ltd.","Sedef Mobilya San.","Lezzet Baharat Ltd.","Vadi Yazılım A.Ş.",
 "Kuzey Madencilik","Ipek Plastik Ltd.","Zirve Makine San.","Berrak Su A.Ş.",
 "Anka Lojistik","Doğan Metal Ltd.","Çağdaş Tekstil","Umut Gıda San.",
 "Ferah Kimya Ltd.","Pusula Danışmanlık","Granit Yapı Malz.","Şahin Nakliyat A.Ş.",
];
function _tohum(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
function _rnd(seed){ let x=seed||123456789; return ()=>{ x^=x<<13; x^=x>>>17; x^=x<<5; x>>>=0; return x/4294967296; }; }
function verisiUret(kod,m,i,b){
  const seed=_tohum(kod); const rng=_rnd(seed);
  const offset=seed % KARSI_HAVUZ.length;
  const out=[]; let idx=0;
  const isim=()=>KARSI_HAVUZ[(offset+(idx++))%KARSI_HAVUZ.length];
  const tutar=()=>Math.round((30000+rng()*900000)/100)*100;
  const gun=()=>String(15+Math.floor(rng()*8)).padStart(2,"0")+".05.2026";
  const kanal=()=>rng()<0.7?"E-posta":"WhatsApp";
  let n=1; const yenikod=()=>kod.split("-").pop()+"."+String(n++).padStart(2,"0");
  for(let k=0;k<m;k++){ const t=tutar();
    out.push({kod:yenikod(),firma:isim(),bizim:t,karsi:t,durum:"MUTABIK",yanit:gun(),kanal:kanal(),tur:rng()<0.5?1:2,mail:"samuraycoratekin@gmail.com"}); }
  for(let k=0;k<i;k++){ const t=tutar(); const sap=Math.round((t*(0.03+rng()*0.12))/100)*100;
    out.push({kod:yenikod(),firma:isim(),bizim:t,karsi:t-sap,durum:"ITIRAZLI",yanit:gun(),kanal:kanal(),tur:rng()<0.5?1:2,mail:"samuraycoratekin@gmail.com"}); }
  for(let k=0;k<b;k++){ const t=tutar();
    out.push({kod:yenikod(),firma:isim(),bizim:t,karsi:0,durum:"BEKLIYOR",yanit:null,kanal:null,tur:rng()<0.5?1:2,mail:"samuraycoratekin@gmail.com"}); }
  return out;
}

// ── Motor:true firma (MUK-001) → GERCEK Excel motoru ─────────────────────
// Ofis panosunda motor:true olan tek mukellef gercek ekstrelere baglidir.
// Burada VERI/CAPRAZ/EKSIK/DEVIR hardcoded showcase yerine motordan gelir:
//   /api/triyaj   → cari listesi + bakiye + durum
//   /api/caprazcari → yanlis cariye islenmis belge adaylari
//   /api/cari_fark  → her itirazli cari icin biz/karsi eksik + tutar farki + devir
// Motora erisilemezse mevcut hardcoded VERI ile devam edilir (pano bos kalmaz).
async function motoraBagla(musteri){
  const q="?musteri="+encodeURIComponent(musteri);
  try{
    const [tr,cz,md]=await Promise.all([
      fetch("/api/triyaj"+q).then(r=>r.json()),
      fetch("/api/caprazcari"+q).then(r=>r.json()),
      fetch("/api/maildurum"+q).then(r=>r.json())
    ]);
    if(!tr || !tr.cariler) throw new Error("triyaj bos");
    const mmap=(md&&md.cariler)||{}, mvar=(md&&md.varsayilan_karsi)||"";
    VERI = tr.cariler.map(c=>({
      kod:c.cari, firma:c.adi, bizim:c.bizim_bakiye, karsi:c.karsi_bakiye,
      durum:(c.durum==="MUTABIK"?"MUTABIK":"ITIRAZLI"),  // AKSIYON = fark var → ITIRAZLI
      yanit:null, kanal:null, tur:1, mail:(mmap[c.cari]||mvar)  // ERP/cari_mailler'dan cozulen adres (yoksa varsayilan)
    }));
    MOTOR_BAGLI=true;
    CAPRAZ = (cz && cz.adaylar ? cz.adaylar : []).map(a=>({
      kesinlik:a.kesinlik, fazla_kod:a.fazla_cari, fazla_firma:a.fazla_adi,
      eksik_kod:a.eksik_cari, eksik_firma:a.eksik_adi,
      belge:a.belge+" · "+TL(a.tutar)+" ₺", ac:a.ac
    }));
    EKSIK={}; DEVIR={};
    const aksiyon=VERI.filter(r=>r.durum==="ITIRAZLI");
    await Promise.all(aksiyon.map(async r=>{
      try{
        const f=await fetch("/api/cari_fark?cari="+encodeURIComponent(r.kod)+"&musteri="+encodeURIComponent(musteri)).then(x=>x.json());
        EKSIK[r.kod]={
          biz:(f.biz_eksik||[]).map(k=>k.ac),
          karsi:(f.karsi_eksik||[]).map(k=>k.ac),
          fark:(f.tutar_farki||[]).map(k=>k.ac)
        };
        if(f.devir && f.devir.var && !f.devir.mutabik){
          DEVIR[r.kod]={biz:f.devir.biz, karsi:f.devir.karsi, fark:f.devir.fark, ac:f.devir.ac};
        }
      }catch(e){}
    }));
  }catch(e){ MOTOR_BAGLI=false; /* motor erisilemedi → hardcoded showcase VERI ile devam */ }
  seciliKur(); guncelKilidiYenile(); tumCiz();
}

// Ofis panosundan acilmissa: mukellef adi, donem, cari listesi ve geri baglantisi
(async function(){
  const p=new URLSearchParams(location.search);
  const ad=p.get("ad"), donem=p.get("donem"), kod=p.get("kod");
  const m=parseInt(p.get("m")), i=parseInt(p.get("i")), b=parseInt(p.get("b"));
  if(ad){ document.getElementById("firmaAd").textContent=ad;
    document.getElementById("gerilink").style.display="inline-block"; }
  if(donem){ document.getElementById("donemAd").textContent=donem; }
  AKTIF_MUSTERI = kod || "MUK-001";
  // Motor:true olan HER mukellef gercek Excel motoruna baglanir (registry'den ogrenilir).
  // Dogrudan acilis (kod yok) = varsayilan motor firmasi.
  let motorlu = !kod;
  if(kod){
    try{
      const reg=await fetch("/api/mukellefler").then(r=>r.json());
      const mk=(reg.mukellefler||[]).find(x=>x.kod===kod);
      motorlu = !!(mk && mk.motor);
    }catch(e){ motorlu = (kod==="MUK-001"); }
  }
  if(motorlu){ await motoraBagla(AKTIF_MUSTERI); return; }
  // Motor:false mukellefler: m/i/b sayilarina uyan kurgu cari; showcase kapatilir.
  if(!isNaN(m) && !isNaN(i) && !isNaN(b)){
    VERI=verisiUret(kod,m,i,b); EKSIK={}; CAPRAZ=[]; DEVIR={};
  }
  seciliKur(); guncelKilidiYenile(); tumCiz();
})();
